name: CI

# Lint + test on every push to main and on pull requests.
on:
  push:
    branches: [main]
  pull_request: {}
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Sync (Python ${{ matrix.python-version }})
        run: uv sync --python ${{ matrix.python-version }}

      - name: Lint
        run: uv run ruff check .

      - name: Test
        run: uv run pytest -q
